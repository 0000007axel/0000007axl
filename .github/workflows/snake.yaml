name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%23F2ECBC&color_dots=%231C2F46,%232D4F67,%237FB4CA,%237E9CD8,%23C8D3F5&color_bg=%230d1117&color_grass=%230d1117
            dist/github-snake-dark.svg?color_snake=%23F2ECBC&color_dots=%231C2F46,%232D4F67,%237FB4CA,%237E9CD8,%23C8D3F5&color_bg=%230d1117&color_grass=%230d1117
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
